<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Jordan Powder Coating</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; }
        a { text-decoration: none; color: inherit; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        header { background: #1a2a4a; color: white; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 24px; font-weight: bold; color: #f0c040; }
        .logo span { color: white; font-weight: normal; }
        nav a { color: white; margin-left: 25px; font-size: 16px; transition: color 0.3s; }
        nav a:hover { color: #f0c040; }
        .lang-switch { background: #f0c040; color: #1a2a4a; padding: 8px 16px; border-radius: 5px; font-weight: bold; }
        .lang-switch:hover { background: #ffd966; }

        .page-header { background: linear-gradient(135deg, #1a2a4a 0%, #2a4a7a 100%); color: white; padding: 50px 0; text-align: center; }
        .page-header h1 { font-size: 40px; }
        .page-header p { font-size: 18px; opacity: 0.8; margin-top: 10px; }

        .contact-section { padding: 50px 0; background: #f8f9fa; }
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .contact-info { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .contact-info h2 { color: #1a2a4a; margin-bottom: 20px; }
        .contact-info .item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .contact-info .item:last-child { border-bottom: none; }
        .contact-info .item strong { display: block; color: #1a2a4a; font-size: 16px; }
        .contact-info .item span { color: #666; font-size: 16px; }
        .map-placeholder { background: #e0e0e0; height: 250px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #666; margin-top: 20px; }

        .contact-form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .contact-form h2 { color: #1a2a4a; margin-bottom: 20px; }
        .contact-form label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 20px; font-size: 16px; }
        .contact-form textarea { height: 120px; resize: vertical; }
        .contact-form button { background: #f0c040; color: #1a2a4a; padding: 14px 40px; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        .contact-form button:hover { background: #ffd966; }

        footer { background: #1a2a4a; color: #ccc; padding: 40px 0; margin-top: 50px; }
        footer .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; }
        footer h4 { color: white; margin-bottom: 15px; font-size: 18px; }
        footer ul { list-style: none; }
        footer ul li { margin-bottom: 8px; }
        footer ul li a { color: #ccc; transition: color 0.3s; }
        footer ul li a:hover { color: #f0c040; }
